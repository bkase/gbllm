      <svg xmlns="http://www.w3.org/2000/svg" width="980" height="304" viewBox="0 0 980 304">
        <rect x="0" y="0" width="980" height="304" fill="#ffffff"/>
        <rect x="12" y="12" width="956" height="280" fill="#f8fafc" stroke="#334155" stroke-width="1"/>
        <text x="24" y="34" font-family="monospace" font-size="18">Directory Layout</text>
<text x="24" y="58" font-family="monospace" font-size="14">flowchart TB</text>
<text x="24" y="82" font-family="monospace" font-size="14">root['store root']</text>
<text x="24" y="106" font-family="monospace" font-size="14">root --&gt; blobs['blobs/sha256']</text>
<text x="24" y="130" font-family="monospace" font-size="14">blobs --&gt; shard['ab/']</text>
<text x="24" y="154" font-family="monospace" font-size="14">shard --&gt; blob['ab...64 hex content hash']</text>
<text x="24" y="178" font-family="monospace" font-size="14">root --&gt; tmp['tmp/blob-*.tmp']</text>
<text x="24" y="202" font-family="monospace" font-size="14">root --&gt; cache['cache/']</text>
<text x="24" y="226" font-family="monospace" font-size="14">cache --&gt; cshard['cd/']</text>
<text x="24" y="250" font-family="monospace" font-size="14">cshard --&gt; index['cd...64 hex stage-cache key']</text>
<text x="24" y="274" font-family="monospace" font-size="14">index --&gt; payload['file body: payload Hash256']</text>
      </svg>
