name: S1 On-Demand Replay

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref or SHA to reproduce"
        required: true
        default: "main"
      seed_list:
        description: "Comma-separated seed list for replay"
        required: false
        default: "0,1,2,3,4"
      pass_version:
        description: "S1 pass version"
        required: false
        default: "0.1.0"
      report_path:
        description: "Pre-registration report path"
        required: false
        default: "docs/experiments/S1-report.md"

concurrency:
  group: s1-full-protocol
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  s1-on-demand:
    name: S1 on-demand replay
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      S1_SEED_LIST: ${{ github.event.inputs.seed_list }}
      S1_PASS_VERSION: ${{ github.event.inputs.pass_version }}
      S1_REPORT_PATH: ${{ github.event.inputs.report_path }}
      S1_ARTIFACT_DIR: experiments/S1
      GBF_BIN: target/release/gbf-cli
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: s1-on-demand-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            s1-on-demand-cargo-${{ runner.os }}-

      - name: Cache TinyStories validation split
        uses: actions/cache@v4
        with:
          path: corpus/tinystories/raw/TinyStoriesV2-GPT4-valid.txt
          key: s1-tinystories-valid-${{ runner.os }}-${{ hashFiles('fixtures/corpora/tinystories.toml') }}

      - name: Verify requested report pre-registration
        run: scripts/s1_preregistration_check.sh --report "$S1_REPORT_PATH"

      - name: Download and verify canonical TinyStories bytes
        run: python3 scripts/download_tinystories.py --split all

      - name: Build production CLI
        run: cargo build --release -p gbf-cli

      - name: S1 doctor preflight
        shell: bash
        run: |
          env -i \
            BURN_NDARRAY_NUM_THREADS=1 \
            BURN_DETERMINISTIC=1 \
            OMP_NUM_THREADS=1 \
            RAYON_NUM_THREADS=1 \
            "$GBF_BIN" s1 doctor \
              --manifest fixtures/corpora/tinystories.toml \
              --out-dir "$S1_ARTIFACT_DIR" \
              --json

      - name: Canonical TinyStories O-metric-4 pin check
        run: scripts/s1_canonical_o_metric_4_check.sh

      - name: Emit canonical S1 oracle artifact
        shell: bash
        run: |
          mkdir -p "$S1_ARTIFACT_DIR/oracle"
          env -i \
            BURN_NDARRAY_NUM_THREADS=1 \
            BURN_DETERMINISTIC=1 \
            OMP_NUM_THREADS=1 \
            RAYON_NUM_THREADS=1 \
            "$GBF_BIN" s1 oracle \
              --manifest fixtures/corpora/tinystories.toml \
              --seed 0 > "$S1_ARTIFACT_DIR/oracle/s1_oracle.v1.json"

      - name: Reproduce current replay surface
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$S1_ARTIFACT_DIR/baseline" "$S1_ARTIFACT_DIR/checkpoints" "$S1_ARTIFACT_DIR/runs"

          env -i \
            BURN_NDARRAY_NUM_THREADS=1 \
            BURN_DETERMINISTIC=1 \
            OMP_NUM_THREADS=1 \
            RAYON_NUM_THREADS=1 \
            "$GBF_BIN" s1 fit-baseline \
              --manifest fixtures/corpora/tinystories.toml \
              --seed 0 > "$S1_ARTIFACT_DIR/baseline/s1_baseline.v1.json"

          env -i \
            BURN_NDARRAY_NUM_THREADS=1 \
            BURN_DETERMINISTIC=1 \
            OMP_NUM_THREADS=1 \
            RAYON_NUM_THREADS=1 \
            "$GBF_BIN" s1 replay \
              --manifest fixtures/corpora/tinystories.toml \
              --pass-version "$S1_PASS_VERSION" \
              --seed-list "$S1_SEED_LIST" \
              --device-profile S1CpuDeterministic \
              --out-dir "$S1_ARTIFACT_DIR" > "$S1_ARTIFACT_DIR/replay_summary.json"

          cat >&2 <<'BOUNDARY'
          On-demand replay reached the current production replay boundary.
          Full score, negative-test, ablation, and final report reproduction are still blocked by bd-1ehz production artifacts and bd-1261 Decision binding.
          The workflow fails here intentionally until those owner beads make the full protocol executable.
          BOUNDARY
          exit 1

      - name: Upload S1 on-demand artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s1-on-demand-artifacts
          path: |
            experiments/S1
            corpus/tinystories/raw/TinyStoriesV2-GPT4-valid.txt
          if-no-files-found: warn
          retention-days: 30
