name: S4 PR Gates

on:
  pull_request:
    paths:
      - "gbf-experiments/**"
      - "gbf-train/**"
      - "gbf-policy/**"
      - "gbf-data/**"
      - "gbf-artifact/**"
      - "gbf-foundation/**"
      - "gbf-model/**"
      - "gbf-test/**"
      - "gbf-cli/**"
      - "gbf-workload/**"
      - "gbf-oracle/**"
      - "fixtures/preregistration/s4.toml"
      - "history/rfcs/F-S4-gutenberg-promotion.md"
      - "experiments/S4/**"
      - "docs/experiments/S4-report.md"
      - "scripts/s4_*.sh"
      - "scripts/s4_*.py"
      - "scripts/tests/s4_preregistration_check_test.sh"
      - "scripts/tests/s4_ci_scripts_test.sh"
      - ".github/workflows/s4-*.yml"

concurrency:
  group: s4-pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  s4-pr:
    name: S4 PR gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run S4 PR determinism smoke and pre-result suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/s4-pr

          run_capture_log() {
            local name="$1"
            shift
            "$@" \
              > >(tee "artifacts/s4-pr/${name}.stdout") \
              2> >(tee "artifacts/s4-pr/${name}.stderr.log" >&2)
          }

          run_capture_ndjson() {
            local name="$1"
            shift
            "$@" \
              > >(tee "artifacts/s4-pr/${name}.stdout") \
              2> >(tee "artifacts/s4-pr/${name}.ndjson" >&2)
          }

          run_capture_ndjson s4-preregistration scripts/s4_preregistration_check.sh --dry-run --output artifacts/s4-pr/s4-preregistration.json
          run_capture_ndjson s4-determinism scripts/s4_determinism_check.sh --report-path artifacts/s4-pr/s4-determinism.json
          run_capture_ndjson s4-full-determinism scripts/s4_full_determinism_check.sh --dry-run --report-path artifacts/s4-pr/s4-full-determinism.json
          run_capture_ndjson s4-isolation scripts/s4_isolation_check.sh --dry-run --report-path artifacts/s4-pr/s4-isolation.json
          run_capture_ndjson s4-api-drift scripts/s4_api_drift_check.sh --dry-run --report-path artifacts/s4-pr/s4-api-drift.json
          run_capture_log s4-preregistration-regression scripts/tests/s4_preregistration_check_test.sh
          run_capture_log s4-ci-scripts-regression scripts/tests/s4_ci_scripts_test.sh

      - name: Upload S4 PR artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s4-pr-artifacts
          path: |
            artifacts/s4-pr/**/*.stdout
            artifacts/s4-pr/**/*.stderr.log
            artifacts/s4-pr/**/*.ndjson
            artifacts/s4-pr/*.json
          if-no-files-found: warn
          retention-days: 14
